name: CI/CD Deployment to Hugging Face Spaces

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Run Test Suite
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        lfs: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Install Dependencies
      run: |
        uv pip install --system -r pyproject.toml
        uv pip install --system pytest httpx

    - name: Run Test Suite
      env:
        PYTHONPATH: .
      run: |
        pytest tests/

  # Job 2: Push code to Hugging Face Spaces
  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        lfs: true

    - name: Push to Hugging Face Spaces
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_SPACE_FRONTEND: ${{ secrets.HF_SPACE_FRONTEND }}
        HF_SPACE_BACKEND: ${{ secrets.HF_SPACE_BACKEND }}
      run: |
        git config --global user.email "deployer@github.actions"
        git config --global user.name "GitHub Actions CI/CD"
        
        # Deploy Frontend Streamlit Space
        if [ -n "$HF_SPACE_FRONTEND" ]; then
          echo "Deploying Streamlit Frontend to HF Space: $HF_SPACE_FRONTEND..."
          git push --force https://deployer:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE_FRONTEND main
        fi
        
        # Deploy Backend FastAPI Space
        if [ -n "$HF_SPACE_BACKEND" ]; then
          echo "Deploying FastAPI Backend to HF Space: $HF_SPACE_BACKEND..."
          git push --force https://deployer:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE_BACKEND main
        fi

  # Job 3: Verify Hugging Face Spaces are successfully running
  verify:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Verify Hugging Face Spaces Deployment Status
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_SPACE_FRONTEND: ${{ secrets.HF_SPACE_FRONTEND }}
        HF_SPACE_BACKEND: ${{ secrets.HF_SPACE_BACKEND }}
      run: |
        python -c '
        import os
        import time
        import urllib.request
        import json
        
        hf_token = os.environ.get("HF_TOKEN")
        spaces = []
        if os.environ.get("HF_SPACE_FRONTEND"):
            spaces.append(os.environ["HF_SPACE_FRONTEND"])
        if os.environ.get("HF_SPACE_BACKEND"):
            spaces.append(os.environ["HF_SPACE_BACKEND"])
            
        if not spaces:
            print("No Hugging Face Spaces defined to check.")
            exit(0)
            
        max_attempts = 40
        check_interval = 15
        print(f"Monitoring Hugging Face Spaces: {spaces}")
        
        for space in spaces:
            print(f"\nChecking Space status for: {space}...")
            req_url = f"https://huggingface.co/api/spaces/{space}"
            headers = {"Authorization": f"Bearer {hf_token}"} if hf_token else {}
            req = urllib.request.Request(req_url, headers=headers)
            
            success = False
            for attempt in range(1, max_attempts + 1):
                try:
                    with urllib.request.urlopen(req) as response:
                        data = json.loads(response.read().decode())
                    
                    runtime = data.get("runtime", {})
                    stage = runtime.get("stage", "UNKNOWN")
                    print(f"  Attempt {attempt}/{max_attempts} | Current Stage: {stage}")
                    
                    if stage == "RUNNING":
                        print(f"  [SUCCESS] Space {space} is successfully running!")
                        success = True
                        break
                    elif stage in ["BUILD_ERROR", "RUNTIME_ERROR"]:
                        print(f"  [FAILURE] Space {space} failed with stage: {stage}")
                        exit(1)
                    elif stage == "PAUSED":
                        print(f"  [WARNING] Space {space} is paused.")
                        exit(1)
                except Exception as e:
                    print(f"  Attempt {attempt}/{max_attempts} | Request failed: {e}")
                
                time.sleep(check_interval)
                
            if not success:
                print(f"  [TIMEOUT] Space {space} did not reach RUNNING stage.")
                exit(1)
                
        print("\nAll Hugging Face Spaces deployed and running successfully!")
        '
