name: CI/CD Deployment to Hugging Face Spaces

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Run Test Suite
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        lfs: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Install Dependencies
      run: |
        uv pip install --system -r pyproject.toml
        uv pip install --system pytest httpx

    - name: Run Test Suite
      env:
        PYTHONPATH: .
      run: |
        pytest tests/

  # Job 2: Push code to Hugging Face Spaces
  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        lfs: true

    - name: Push to Hugging Face Spaces
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_SPACE_FRONTEND: ${{ secrets.HF_SPACE_FRONTEND }}
        HF_SPACE_BACKEND: ${{ secrets.HF_SPACE_BACKEND }}
      run: |
        git config --global user.email "deployer@github.actions"
        git config --global user.name "GitHub Actions CI/CD"
        
        # Deploy Frontend Streamlit Space
        if [ -n "$HF_SPACE_FRONTEND" ]; then
          echo "Deploying Streamlit Frontend to HF Space: $HF_SPACE_FRONTEND..."
          git checkout -b temp-deploy-frontend
          cp frontend.Dockerfile Dockerfile
          printf "%s\n" "---" "title: TSP Solver Playground" "emoji: 🗺️" "colorFrom: indigo" "colorTo: purple" "sdk: docker" "pinned: false" "app_port: 7860" "---" > temp_readme.md
          cat README.md >> temp_readme.md
          mv temp_readme.md README.md
          git add Dockerfile README.md
          git commit -m "Deploy Streamlit Frontend"
          git push --force https://deployer:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE_FRONTEND temp-deploy-frontend:main
          git checkout main
        fi
        
        # Deploy Backend FastAPI Space
        if [ -n "$HF_SPACE_BACKEND" ]; then
          echo "Deploying FastAPI Backend to HF Space: $HF_SPACE_BACKEND..."
          git checkout -b temp-deploy-backend
          printf "%s\n" "---" "title: TSP Solver API" "emoji: ⚙️" "colorFrom: blue" "colorTo: indigo" "sdk: docker" "pinned: false" "app_port: 7860" "---" > temp_readme.md
          cat README.md >> temp_readme.md
          mv temp_readme.md README.md
          git add README.md
          git commit -m "Deploy FastAPI Backend"
          git push --force https://deployer:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE_BACKEND temp-deploy-backend:main
          git checkout main
        fi

  # Job 3: Verify Hugging Face Spaces are successfully running
  verify:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Verify Hugging Face Spaces Deployment Status
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        HF_SPACE_FRONTEND: ${{ secrets.HF_SPACE_FRONTEND }}
        HF_SPACE_BACKEND: ${{ secrets.HF_SPACE_BACKEND }}
      run: |
        python scripts/verify_spaces.py
